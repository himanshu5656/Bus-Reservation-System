<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Bus</title>
  <link rel="stylesheet" href="styles.css">
  <style>* {
    box-sizing: border-box;
  }
  
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f4f4f4;
    margin: 0;
  }
  
  .container {
    background: #fff;
    padding: 2em;
    border-radius: 5px;
    width: 100%;
    max-width: 600px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }
  
  h1 {
    margin-bottom: 1em;
    color: #333;
  }
  
  .results-container {
    display: flex;
    flex-direction: column;
    gap: 1em;
  }
  
  .bus-card {
    padding: 1em;
    border: 1px solid #ddd;
    border-radius: 4px;
    background-color: #fafafa;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .bus-details {
    text-align: left;
  }
  
  .bus-details p {
    margin: 0.2em 0;
    color: #555;
  }
  
  button {
    padding: 0.5em 1em;
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  
  button:hover {
    background-color: #218838;
  }
  </style>
</head>
<body>
  <div class="container">
    <h1>Select Your Bus</h1>
    <div id="bus-list" class="results-container"></div>
  </div>

  <script src="select.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking History</title>
    <link rel="stylesheet" href="style.css">
    <style>.booking-history table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      
      .booking-history th, .booking-history td {
        padding: 10px;
        border: 1px solid #dee2e6;
        text-align: center;
      }
      
      .booking-history th {
        background-color: #080808;
        color: white;
      }
      
      .booking-history td {
        background-color: #5f9cd8;
      }
      
      .booking-history tr:nth-child(even) td {
        background-color: #5f9cd8;
      }</style>
</head>
<body>
    <div class="booking-history">
        <h3>Booking History</h3>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Route</th>
              <th>Seats</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>2024-06-17</td>
              <td>City A - City D</td>
              <td>5, 6</td>
              <td>Confirmed</td>
            </tr>
            <tr>
              <td>2024-08-10</td>
              <td>City D- City C</td>
              <td>2, 3</td>
              <td>Cancelled</td>
            </tr>
            <tr>
              <td>2024-06-17</td>
              <td>City b - City D</td>
              <td>5, 6</td>
              <td>Confirmed</td>
            </tr>
          </tbody>
        </table>
         
</body>
</html>

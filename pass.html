<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Bus Reservation System</title>
  <link rel="stylesheet" href="style.css">
  <style>/* General Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    
    body {
      background-color: #bed8f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    /* Change Password Section */
    .change-password-section {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    .change-password-section h2 {
      color: #070707;
      margin-bottom: 20px;
      font-size: 24px;
    }
    
    /* Form Styles */
    .change-password-form {
      display: flex;
      flex-direction: column;
    }
    
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      color: #495057;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .form-group input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ced4da;
      border-radius: 5px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    
    .form-group input[type="password"]:focus {
      border-color: #007bff;
      outline: none;
    }
    
    /* Button Styles */
    .btn {
      padding: 10px 0;
      background-color: #0a0b0b;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .btn:hover {
      background-color: #060606;
    }
    
    .submit-btn {
      margin-top: 10px;
    }
    </style>
</head>
<body>

  <!-- Change Password Form -->
  <section class="change-password-section">
    <h2>Change Password</h2>
    <form class="change-password-form" action="/change_password" method="POST">
      
      <!-- Current Password -->
      <div class="form-group">
        <label for="current-password">Current Password</label>
        <input type="password" id="current-password" name="current-password" required>
      </div>
      
      <!-- New Password -->
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" name="new-password" required>
      </div>
      
      <!-- Confirm New Password -->
      <div class="form-group">
        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" name="confirm-password" required>
      </div>
      
      <!-- Submit Button -->
      <button type="submit" class="btn submit-btn" aria-placeholder="required">Update Password </button>
    </form>
  </section>

</body>
</html>

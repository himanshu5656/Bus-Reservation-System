<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - Bus Reservation System</title>
  <link rel="stylesheet" href="style.css">
  <style>/* General Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    
    body {
      background-color: #f8f7f7;
    }
    
    .header {
      background-color: #343a40;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .header h1 {
      margin-right: auto;
      font-size: 24px;
    }
    
    .header nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }
    
    .header nav a.active {
      border-bottom: 2px solid #ffc107;
    }
    
    .header nav a:hover {
      color: #ffc107;
    }
    
    .account-section {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background-color: #fd5d5d;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    
    .account-section h2 {
      text-align: center;
      color: #343a40;
      margin-bottom: 20px;
    }
    
    .account-info, .account-settings, .booking-history {
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid #e9ecef;
      border-radius: 5px;
      background-color: #f1f3f5;
    }
    
    .account-info h3, .account-settings h3, .booking-history h3 {
      color: #0c0c0c;
      margin-bottom: 10px;
    }
    
    .btn {
      display: inline-block;
      padding: 8px 12px;
      color: white;
      background-color: #f0bfa7;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    .btn:hover {
      background-color: #0056b3;
    }
    
    .edit-btn {
      background-color: #121211;
    }
    
    .edit-btn:hover {
      background-color: #0b0b0b;
    }
    
    .settings-btn {
      margin-right: 10px;
    }
    
    .booking-history table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    
    .booking-history th, .booking-history td {
      padding: 10px;
      border: 1px solid #dee2e6;
      text-align: center;
    }
    
    .booking-history th {
      background-color: #080808;
      color: white;
    }
    
    .booking-history td {
      background-color: #5f9cd8;
    }
    
    .booking-history tr:nth-child(even) td {
      background-color: #5f9cd8;
    }
    </style>
 
</head>
<body>

  <!-- My Account Content -->
  <section class="account-section">
    <h2>My Account</h2>
    
    <!-- User Info Section -->
    <div class="account-info">
      <h3>Personal Details</h3>
      <p><strong>Name:</strong> John Doe</p>
      <p><strong>Email:</strong> johndoe@example.com</p>
      <p><strong>Phone:</strong> +123456789</p>
      <button class="btn edit-btn">Edit Details</button>
    </div>

    <!-- Settings Section -->
    <div class="account-settings">
      <h3>Account Settings</h3>
      <button class="btn settings-btn"><a href="pass.html">Change password</a></button><br>
      <button class="btn settings-btn"><a href="payment.html">Payment Methods</a></button><br>
      <button class="btn settings-btn"><a href="navigation.html">Notification Preferences</a></button>
    </div>

    <!-- Booking History Section -->
    <div class="booking-history">
      <h3>Booking History</h3>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Route</th>
            <th>Seats</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2024-06-17</td>
            <td>City A - City B</td>
            <td>5, 6</td>
            <td>Confirmed</td>
          </tr>
          <tr>
            <td>2024-08-10</td>
            <td>City A - City C</td>
            <td>2, 3</td>
            <td>Cancelled</td>
          </tr>
          <tr>
            <td>2024-06-17</td>
            <td>City B - City C</td>
            <td>5, 6</td>
            <td>Confirmed</td>
          </tr>
        </tbody>
      </table>
       <a href="see more.html"> see more</a>
    </div>
  </section>

</body>
</html>

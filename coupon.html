<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Booking Coupon</title>
<style>
    /* Container for the coupon */
    .coupon {
        border: 2px dashed #ff6600;
        border-radius: 10px;
        width: 300px;
        max-width: 100%;
        background-color: #f9f9f9;
        margin: 20px auto;
        padding: 20px;
        text-align: center;
        font-family: Arial, sans-serif;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Coupon header */
    .coupon h2 {
        color: #ff6600;
        margin: 0 0 10px;
    }

    /* Coupon code */
    .coupon .code {
        font-size: 24px;
        font-weight: bold;
        color: #333;
        margin: 10px 0;
        letter-spacing: 2px;
    }

    /* Discount details */
    .coupon .details {
        color: #555;
        font-size: 14px;
        margin-bottom: 20px;
    }

    /* Button for booking */
    .coupon a {
        text-decoration: none;
        color: #fff;
        background-color: #ff6600;
        padding: 10px 20px;
        border-radius: 5px;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }

    .coupon a:hover {
        background-color: #e55a00;
    }
</style>
</head>
<body>

<!-- Coupon Section -->
<div class="coupon">
    <h2>Bus Booking Discount</h2>
    <div class="code">SAVE20</div>
    <p class="details">Use this code to get 20% off your next bus booking!</p>
    <a href="booking.html">Book Now</a>
</div>

</body>
</html>

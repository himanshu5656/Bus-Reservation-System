<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
    }
    body{
            width: 100%;
            height: 100vh;
            background-color: rgba(203, 11, 40, 0.578);
        }
    
    .login-container {
      background-color: #ffffff;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    .login-container h2 {
      margin-bottom: 1rem;
      color: #333333;
    }
    
    .input-group {
      margin-bottom: 1rem;
      text-align: left;
    }
    
    .input-group label {
      font-size: 0.9rem;
      color: #555555;
      display: block;
      margin-bottom: 0.5rem;
    }
    
    .input-group input {
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    
    .login-btn {
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
      color: #ffffff;
      background-color: #ff000d;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 1rem;
    }
    
    .login-btn:hover {
      background-color: #0056b3;
    }
    
    .signup-link {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #555555;
    }
    
    .signup-link a {
      color: #3416dc;
      text-decoration: none;
    }
    
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form action="#" method="POST">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="signup-link">
      <p>Don't have an account? <a href="sign up.html">Sign up here</a></p>
    </div>
  </div>
</body>
</html>

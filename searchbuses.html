<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Buses</title>
  <link rel="stylesheet" href="styles.css">
  <style>* {
    box-sizing: border-box;
  }
  
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #555;
  }
  
  .container {
    background: #fff;
    padding: 2em;
    border-radius: 5px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 10px rgba(28, 28, 28, 0.1);
  }
  
  h1 {
    margin-bottom: 1em;
    color: #333;
  }
  
  label {
    display: block;
    text-align: left;
    margin-top: 1em;
    color: #555;
  }
  
  input, button {
    width: 100%;
    padding: 0.75em;
    margin-top: 0.5em;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
  }
  
  button {
    background-color: #d64747;
    color: #fff;
    cursor: pointer;
    margin-top: 1em;
  }
  
  button:hover {
    background-color: #e51919;
  }
  
  .results-container {
    margin-top: 1em;
    color: #555;
  }
  </style>
</head>
<body>
  <div class="container">
    <h1>Search Buses</h1>
    <form id="search-form">
      <label for="departure">Departure City</label>
      <input type="text" id="departure" required>
      
      <label for="arrival">Arrival City</label>
      <input type="text" id="arrival" required>
      
      <label for="date">Date of Journey</label>
      <input type="date" id="date" required>

      <button type="button" onclick="searchBuses()"><a href="selectbus.html">Search Buses</a></button>
    </form>
    <div id="search-results" class="results-container"></div>
  </div>

</body>
</html>
